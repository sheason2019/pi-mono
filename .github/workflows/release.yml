name: Release d-pi

on:
  push:
    tags:
      - 'd-pi-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., d-pi-v0.6.0-alpha.3)'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

  publish:
    name: Publish d-pi
    needs: test
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - package: d-pi
            npm_name: '@sheason/d-pi'
            pkg_path: packages/d-pi
            dist_dir: dist
            publish_npm: true
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install monorepo dependencies
        run: npm ci --ignore-scripts

      - name: Build workspace
        run: npm run build

      - name: Compute npm dist-tag from release tag
        id: dist-tag
        run: |
          # The release tag can be either a plain semver tag
          # ("v0.6.0-alpha.4") or a d-pi-prefixed one
          # ("d-pi-v0.6.0-alpha.4"), depending on whether it came
          # from a `git tag v0.6.0-alpha.4` push or a
          # `git tag d-pi-v0.6.0-alpha.4` push. Both shapes are
          # accepted by the workflow's `on.push.tags: d-pi-v*`
          # trigger, so the parser has to handle both.
          #
          # Strip the optional `v` prefix and the optional `d-pi-`
          # prefix, leaving the bare semver string for the regex.
          TAG="${RELEASE_TAG#d-pi-v}"
          TAG="${TAG#v}"
          if [[ "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-(alpha|beta|rc)\.([0-9]+)$ ]]; then
            DIST_TAG="${BASH_REMATCH[4]}"
          elif [[ "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            DIST_TAG="latest"
          else
            echo "::error::Unrecognized release tag format: ${RELEASE_TAG} (after stripping prefixes: ${TAG}; expected vX.Y.Z or d-pi-vX.Y.Z, with optional -{alpha,beta,rc}.N)"
            exit 1
          fi
          echo "dist-tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved ${RELEASE_TAG} -> ${TAG} -> npm dist-tag '${DIST_TAG}'"

      - name: Build ${{ matrix.package }} (idempotent rebuild of own workspace)
        working-directory: ${{ matrix.pkg_path }}
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -d "${{ matrix.pkg_path }}/${{ matrix.dist_dir }}" ]; then
            echo "::error::${{ matrix.pkg_path }}/${{ matrix.dist_dir }} is missing after build"
            exit 1
          fi

      - name: Upgrade npm for trusted publishing
        if: matrix.publish_npm
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Publish ${{ matrix.npm_name }} to npm
        if: matrix.publish_npm
        working-directory: ${{ matrix.pkg_path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish \
            --access public \
            --tag "${{ steps.dist-tag.outputs.dist-tag }}" \
            --provenance \
            --ignore-scripts

      - name: Upload build artifacts for release attachment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Use `matrix.package` (short slug like "ai", "tui") instead of
          # `matrix.npm_name` (e.g. "@sheason/pi-ai") because GitHub Actions
          # artifact names reject forward slashes.
          name: pkg-${{ matrix.package }}
          path: ${{ matrix.pkg_path }}/${{ matrix.dist_dir }}/
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download d-pi build
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: pkg-d-pi
          path: release-artifacts/d-pi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          # Idempotent re-run: allow overwriting existing assets.
          overwrite_files: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/d-pi/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
