name: Release d-pi

on:
  push:
    tags:
      - 'd-pi-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., d-pi-v0.6.0-alpha.10)'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release d-pi
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify build output exists
        run: |
          if [ ! -d "packages/d-pi/dist" ]; then
            echo "::error::packages/d-pi/dist is missing after build"
            exit 1
          fi

      - name: Compute npm dist-tag from release tag
        id: dist-tag
        run: |
          TAG="${RELEASE_TAG#d-pi-v}"
          TAG="${TAG#v}"
          if [[ "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-(alpha|beta|rc)\.([0-9]+)$ ]]; then
            DIST_TAG="${BASH_REMATCH[4]}"
          elif [[ "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            DIST_TAG="latest"
          else
            echo "::error::Unrecognized release tag format: ${RELEASE_TAG}"
            exit 1
          fi
          echo "dist-tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Publish to npm
        working-directory: packages/d-pi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish \
            --access public \
            --tag "${{ steps.dist-tag.outputs.dist-tag }}" \
            --provenance \
            --ignore-scripts

      - name: Package dist as tar.gz
        run: |
          VERSION="${RELEASE_TAG#d-pi-v}"
          VERSION="${VERSION#v}"
          ARCHIVE_NAME="d-pi-${VERSION}.tar.gz"
          DIR_NAME="d-pi-${VERSION}"
          cd packages/d-pi
          cp -r dist "$DIR_NAME"
          tar -czf "$ARCHIVE_NAME" "$DIR_NAME"
          rm -rf "$DIR_NAME"
          mv "$ARCHIVE_NAME" ../../
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
        id: archive

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            ${{ steps.archive.outputs.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
